name: Deploy Backoffice to GitHub Pages

on:
  push:
    branches:
      - master # Trigger on push to master branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: backoffice/package-lock.json

      - name: Install dependencies
        run: |
          cd backoffice
          npm ci

      - name: Build backoffice
        run: |
          cd backoffice
          # Connect to production Render API url
          VITE_API_URL=https://edgs-app.onrender.com npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: backoffice/dist
          branch: gh-pages
