version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: edgs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: edgs
      POSTGRES_USER: edgs_user
      POSTGRES_PASSWORD: edgs_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U edgs_user -d edgs']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: edgs_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: edgs_minio
      MINIO_ROOT_PASSWORD: edgs_minio_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edgs_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://edgs_user:edgs_secret@db:5432/edgs
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 24h
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: edgs_minio
      MINIO_SECRET_KEY: edgs_minio_secret
      MINIO_BUCKET: edgs-photos
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: edgs_backoffice
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
